<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- the loupe: a lens over the fleet -->
  <circle cx="232" cy="232" r="118" fill="none" stroke="url(#ring)" stroke-width="26"/>
  <line x1="318" y1="318" x2="404" y2="404" stroke="url(#ring)" stroke-width="34" stroke-linecap="round"/>

  <!-- agents inside the lens, one lit -->
  <circle cx="232" cy="232" r="26" fill="#38bdf8"/>
  <circle cx="168" cy="188" r="13" fill="#64748b"/>
  <circle cx="292" cy="184" r="13" fill="#64748b"/>
  <circle cx="176" cy="286" r="13" fill="#64748b"/>
  <circle cx="290" cy="284" r="13" fill="#a78bfa"/>

  <!-- links from the hub -->
  <g stroke="#475569" stroke-width="7" stroke-linecap="round">
    <line x1="232" y1="232" x2="168" y2="188"/>
    <line x1="232" y1="232" x2="292" y2="184"/>
    <line x1="232" y1="232" x2="176" y2="286"/>
    <line x1="232" y1="232" x2="290" y2="284"/>
  </g>
</svg>
