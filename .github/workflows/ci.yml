name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install
      - name: Typecheck web
        run: cd web && bunx tsc --noEmit
      - name: Build web
        run: cd web && bunx vite build
      - name: Server boots
        run: |
          cd server
          AGENTGLASS_PORT=4123 AGENTGLASS_DB=/tmp/ci.db bun run src/index.ts &
          SVPID=$!
          sleep 2
          curl -sf http://localhost:4123/health
          kill $SVPID
